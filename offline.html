<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline - PositiveBacklink</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#3ECF8E">
<link rel="manifest" href="/manifest.webmanifest">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;text-align:center;padding:48px 32px;background:#1e293b;border:1px solid #334155;border-radius:16px}
h1{font-size:28px;margin-bottom:12px;color:#3ECF8E}
p{color:#94a3b8;line-height:1.6;margin-bottom:24px}
.icon{font-size:48px;margin-bottom:16px}
button{background:#3ECF8E;color:#0f172a;border:none;padding:12px 32px;border-radius:8px;font-weight:600;cursor:pointer;font-size:15px}
button:hover{background:#34b478}
a{color:#3ECF8E;text-decoration:none;display:inline-block;margin-top:16px;font-size:14px}
</style>
</head>
<body>
<div class="card">
<div class="icon">📡</div>
<h1>You are offline</h1>
<p>PositiveBacklink requires an internet connection. Check your network and try again.</p>
<button onclick="location.reload()">Retry connection</button>
<br><a href="/">Back to home</a>
</div>
</body>
</html>
