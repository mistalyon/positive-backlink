<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password - PositiveBacklink</title>
<meta name="description" content="Reset your PositiveBacklink account password." />
<meta name="robots" content="noindex,nofollow" />
<link rel="canonical" href="https://www.positivebacklink.com/reset-password.html" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e5e5e5;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}nav{background:#111;border-bottom:1px solid #222;padding:16px 24px}.nav-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}.logo{color:#3ECF8E;font-weight:700;font-size:18px;text-decoration:none}.nav-links a{color:#a1a1a1;text-decoration:none;margin-left:24px;font-size:14px}.nav-links a:hover{color:#3ECF8E}.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}.card{background:#111;border:1px solid #222;border-radius:12px;padding:36px;width:100%;max-width:440px}h1{font-size:26px;color:#fff;font-weight:700;margin-bottom:8px}.subtitle{color:#a1a1a1;font-size:14px;margin-bottom:28px}.field{margin-bottom:18px}.field label{display:block;color:#c5c5c5;font-size:13px;margin-bottom:6px;font-family:'JetBrains Mono',monospace}.field input{width:100%;background:#0d0d0d;color:#e5e5e5;border:1px solid #222;border-radius:6px;padding:11px 14px;font-size:14px}.field input:focus{outline:none;border-color:#3ECF8E}.btn{width:100%;background:#3ECF8E;color:#0a0a0a;border:none;padding:13px;border-radius:6px;font-weight:600;cursor:pointer;font-size:15px}.btn:hover:not(:disabled){background:#2dd4a0}.btn:disabled{background:#1a3d2e;color:#666;cursor:not-allowed}.alert{padding:12px 14px;border-radius:6px;margin-bottom:18px;font-size:13px;display:none}.alert.show{display:block}.alert-error{background:#2a0a0a;border:1px solid #ff5555;color:#ff8888}.alert-success{background:#0d2520;border:1px solid #3ECF8E;color:#3ECF8E}.alert-info{background:#0d1a2a;border:1px solid #4a90e2;color:#88bbff}.footer-text{text-align:center;color:#666;font-size:13px;margin-top:24px}.footer-text a{color:#3ECF8E;text-decoration:none}.icon-big{font-size:48px;text-align:center;margin-bottom:16px;color:#3ECF8E}</style>
</head><body>
<nav><div class="nav-inner"><a href="/" class="logo">PositiveBacklink</a><div class="nav-links"><a href="/login.html">Sign in</a><a href="/register.html">Create account</a></div></div></nav>
<div class="main"><div class="card">
<div id="requestView"><h1>Reset password</h1><p class="subtitle">Enter your email and we'll send you a secure reset link.</p>
<div id="err1" class="alert alert-error"></div><div id="ok1" class="alert alert-success"></div>
<form id="reqForm"><div class="field"><label for="email">Email</label><input type="email" id="email" required autocomplete="email" placeholder="you@example.com" /></div><button type="submit" class="btn" id="reqBtn">Send reset link</button></form>
<div class="footer-text">Remembered? <a href="/login.html">Back to sign in</a></div></div>
<div id="updateView" style="display:none"><h1>Set new password</h1><p class="subtitle">Choose a strong new password.</p>
<div id="err2" class="alert alert-error"></div><div id="ok2" class="alert alert-success"></div>
<form id="updForm"><div class="field"><label for="p1">New password</label><input type="password" id="p1" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" /></div>
<div class="field"><label for="p2">Confirm password</label><input type="password" id="p2" required minlength="8" autocomplete="new-password" placeholder="Repeat the password" /></div>
<button type="submit" class="btn" id="updBtn">Update password</button></form></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
(function(){const URL='https://hsgxsxiwwkuplcedfhxq.supabase.co',K=window.SUPABASE_ANON_KEY||'REPLACE_WITH_YOUR_ANON_KEY';const sb=window.supabase.createClient(URL,K);
function se(i,m){const e=document.getElementById(i);e.textContent=m;e.classList.add('show');}function so(i,m){const e=document.getElementById(i);e.textContent=m;e.classList.add('show');}
const h=window.location.hash;if(h.indexOf('type=recovery')>-1||h.indexOf('access_token')>-1){document.getElementById('requestView').style.display='none';document.getElementById('updateView').style.display='block';}
document.getElementById('reqForm').addEventListener('submit',async function(e){e.preventDefault();const em=document.getElementById('email').value.trim();const b=document.getElementById('reqBtn');b.disabled=true;b.textContent='Sending...';try{const {error}=await sb.auth.resetPasswordForEmail(em,{redirectTo:window.location.origin+'/reset-password.html'});if(error){se('err1',error.message);b.disabled=false;b.textContent='Send reset link';return;}so('ok1','Check your inbox for the reset link.');b.textContent='Sent';}catch(x){se('err1','Error: '+x.message);b.disabled=false;b.textContent='Send reset link';}});
document.getElementById('updForm').addEventListener('submit',async function(e){e.preventDefault();const a=document.getElementById('p1').value,c=document.getElementById('p2').value;if(a!==c){se('err2','Passwords do not match.');return;}if(a.length<8){se('err2','Min 8 characters.');return;}const b=document.getElementById('updBtn');b.disabled=true;b.textContent='Updating...';try{const {error}=await sb.auth.updateUser({password:a});if(error){se('err2',error.message);b.disabled=false;b.textContent='Update password';return;}so('ok2','Password updated. Redirecting...');setTimeout(()=>window.location.href='/dashboard.html',1500);}catch(x){se('err2','Error: '+x.message);b.disabled=false;b.textContent='Update password';}});
})();
</script></body></html>
