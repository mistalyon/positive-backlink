<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - PositiveBacklink</title>
<meta name="description" content="Create a free PositiveBacklink account and start exchanging quality backlinks.">
<link rel="canonical" href="https://www.positivebacklink.com/register.html">
<meta name="google-site-verification" content="0bm_X9ojXIi_-sV7Ov0on_H-WS89MnzovlsSPtoWzO4">
<meta name="msvalidate.01" content="5627D94178E561857861AE89E474F98A">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a'/%3E%3Ctext x='50' y='65' font-size='60' text-anchor='middle' fill='%233ECF8E' font-family='monospace' font-weight='bold'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#e5e5e5;min-height:100vh;display:flex;flex-direction:column}
.nav{padding:1.5rem 2rem;border-bottom:1px solid #1f1f1f}
.logo{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:700;color:#3ECF8E;text-decoration:none}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{width:100%;max-width:420px;background:#0f0f0f;border:1px solid #1f1f1f;border-radius:12px;padding:2.5rem}
.auth-tag{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#3ECF8E;letter-spacing:.1em;margin-bottom:.5rem}
.auth-title{font-size:1.75rem;font-weight:700;color:#fff;margin-bottom:.5rem;letter-spacing:-.02em}
.auth-sub{color:#a3a3a3;font-size:0.95rem;margin-bottom:2rem}
.oauth-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.85rem;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-weight:500;font-size:.95rem;cursor:pointer;transition:all .15s}
.oauth-btn:hover{background:#1f1f1f;border-color:#3a3a3a}
.oauth-btn svg{width:18px;height:18px}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:#525252;font-family:'JetBrains Mono',monospace;font-size:0.7rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1f1f1f}
.field{margin-bottom:1.25rem}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#a3a3a3;letter-spacing:.05em;margin-bottom:.5rem}
.field input[type=email],.field input[type=password]{width:100%;padding:.75rem .9rem;background:#0a0a0a;border:1px solid #262626;border-radius:6px;color:#fff;font-family:inherit;font-size:.95rem;transition:border-color .15s}
.field input:focus{outline:none;border-color:#3ECF8E}
.field-row{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem}
.field-row a{color:#3ECF8E;text-decoration:none;font-size:.85rem}
.field-row a:hover{text-decoration:underline}
.checkbox-row{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:1.25rem;color:#a3a3a3;font-size:.85rem}
.checkbox-row input{margin-top:.2rem;accent-color:#3ECF8E}
.checkbox-row a{color:#3ECF8E;text-decoration:none}
.checkbox-row a:hover{text-decoration:underline}
.submit-btn{width:100%;padding:.85rem;background:#3ECF8E;color:#0a0a0a;border:none;border-radius:8px;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .15s}
.submit-btn:hover:not(:disabled){background:#2eb872;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.alt-link{text-align:center;margin-top:1.5rem;color:#a3a3a3;font-size:.9rem}
.alt-link a{color:#3ECF8E;text-decoration:none;font-weight:500}
.alt-link a:hover{text-decoration:underline}
.msg{padding:.75rem .9rem;border-radius:6px;margin-bottom:1.25rem;font-size:.85rem;display:none}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.msg.success{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);color:#86efac;display:block}
.msg.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd;display:block}
footer{padding:1.5rem 2rem;border-top:1px solid #1f1f1f;text-align:center;color:#525252;font-family:'JetBrains Mono',monospace;font-size:.75rem}
footer a{color:#737373;text-decoration:none}
footer a:hover{color:#3ECF8E}
</style>
</head>
<body>
<nav class="nav"><a href="/" class="logo">// PositiveBacklink</a></nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-tag">// CREATE ACCOUNT</div>
    <h1 class="auth-title">Get started free</h1>
    <p class="auth-sub">Join 500+ sites already growing through ABC triangular exchanges.</p>
    <div id="msg" class="msg"></div>
    <button id="google-btn" class="oauth-btn" type="button">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider">OR REGISTER WITH EMAIL</div>
    <form id="register-form">
      <div class="field">
        <label for="email">// EMAIL</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">// PASSWORD (8+ characters)</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="••••••••••••">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a>.</label>
      </div>
      <button id="submit-btn" class="submit-btn" type="submit">Create account →</button>
    </form>
    <div class="alt-link">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>
<footer>// PositiveBacklink • <a href="/">Home</a> • <a href="/blog/">Blog</a> • <a href="/tools/">Tools</a></footer>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL = "https://hsgxsxiwwkuplcedfhxq.supabase.co";
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "REPLACE_WITH_YOUR_ANON_KEY";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const msg = document.getElementById("msg");
const form = document.getElementById("register-form");
const submitBtn = document.getElementById("submit-btn");
const googleBtn = document.getElementById("google-btn");
function showMsg(text, type) { msg.textContent = text; msg.className = "msg " + type; }
if (SUPABASE_ANON_KEY === "REPLACE_WITH_YOUR_ANON_KEY") {
  showMsg("Auth not configured: Supabase anon key missing. Site admin must set window.SUPABASE_ANON_KEY before sign-up works.", "info");
  submitBtn.disabled = true; googleBtn.disabled = true;
}
supabase.auth.getSession().then(({ data }) => { if (data.session) window.location.href = "/dashboard.html"; });
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  submitBtn.disabled = true; submitBtn.textContent = "Creating account...";
  const { data, error } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin + "/dashboard.html" } });
  if (error) { showMsg(error.message, "error"); submitBtn.disabled = false; submitBtn.textContent = "Create account →"; return; }
  if (data.user && !data.session) {
    showMsg("Check your email to confirm your account.", "success");
    submitBtn.textContent = "Email sent ✓";
  } else {
    showMsg("Account created! Redirecting...", "success");
    setTimeout(() => { window.location.href = "/dashboard.html"; }, 800);
  }
});
googleBtn.addEventListener("click", async () => {
  const { error } = await supabase.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + "/dashboard.html" } });
  if (error) showMsg(error.message, "error");
});
</script>
</body>
</html>
